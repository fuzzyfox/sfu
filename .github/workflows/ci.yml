name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  service:
    name: Service · build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: service/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  skill:
    name: Skill · test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}

      - run: uv sync
      - run: uv run pytest

  skill-native:
    name: Skill · native stdlib smoke (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill/slack-file-upload
    strategy:
      fail-fast: false
      matrix:
        # The shipped Skill is stdlib-only and must run on the native macOS python3
        # (3.9). This job imports and runs the bundled wrappers with no `uv sync` /
        # editable install — pure stdlib — so a regression that reintroduces a 3.11+
        # dependency into shipped code fails here, not on a user's Mac.
        python: ['3.9', '3.10']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Each wrapper imports the whole package, so `--help` exercises every module.
      - run: python scripts/slack-upload --help
      - run: python scripts/slack-login --help
