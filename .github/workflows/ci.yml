name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  service:
    name: Service · build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: service/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  skill:
    name: Skill · test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}

      - run: uv sync
      - run: uv run pytest
